{% extends 'base.html' %}

{% block title %}Votar - {{ voting.title }}{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container text-center">
        <h1>{{ voting.title }}</h1>
    </div>
</div>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h3 class="card-title mb-4 text-center">Confirmar Voto</h3>
                    
                    <div class="alert alert-info">
                        <p><strong>Votante:</strong> {{ voter_name }}</p>
                        <p><strong>Opción:</strong> {{ subject.name }}</p>
                    </div>
                    
                    <p class="text-center text-muted mb-4">
                        Por favor confirma tu voto. Esta acción no puede ser desecha.
                    </p>
                    
                    <form method="post" class="needs-validation" novalidate>
                        {% csrf_token %}
                        
                        <div class="d-grid gap-2 mt-5">
                            <button type="submit" class="btn btn-success btn-lg">
                                ✓ Confirmar Voto
                            </button>
                            <a href="{% url 'voting:voting_detail' voting.id %}" class="btn btn-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Validación del formulario
    (function () {
        'use strict';
        window.addEventListener('load', function () {
            var forms = document.querySelectorAll('.needs-validation');
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        }, false);
    })();
</script>
{% endblock %}
